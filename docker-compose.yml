# ============================================================
# Glanzoo — Production Docker Compose
# Services: PostgreSQL 16, Redis 7, Next.js App
# ============================================================
# Usage:
#   cp .env.docker .env.local.docker  (fill in real secrets)
#   docker compose up -d --build
#   docker compose logs -f app
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: glanzoo-postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glanzoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glanzoo_dev_password_2024}
      POSTGRES_DB: ${POSTGRES_DB:-glanzoo}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - glanzoo-internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glanzoo} -d ${POSTGRES_DB:-glanzoo}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # Redis 7 — Rate Limiting, Session Cache, Queue
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: glanzoo-redis
    restart: unless-stopped
    env_file:
      - .env.docker
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - glanzoo-internal
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ----------------------------------------------------------
  # Next.js App — Production Build
  # ----------------------------------------------------------
  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: glanzoo-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      # Override DATABASE_URL to point to internal db service using correct password
      DATABASE_URL: postgresql://${POSTGRES_USER:-glanzoo}:${POSTGRES_PASSWORD:-glanzoo_dev_password_2024}@db:5432/${POSTGRES_DB:-glanzoo}?connection_limit=10&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glanzoo-internal
    volumes:
      - uploads:/app/public/uploads # Persist local uploads (use Cloudinary in prod)
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ----------------------------------------------------------
# Named Volumes (data persists across container restarts)
# ----------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

# ----------------------------------------------------------
# Internal Network (services talk to each other privately)
# ----------------------------------------------------------
networks:
  glanzoo-internal:
    driver: bridge
